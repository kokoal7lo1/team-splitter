<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Splitter</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  direction: rtl;
}

.dark {
  background: #111;
  color: white;
}

.container {
  padding: 20px;
}

button {
  padding: 12px;
  margin: 5px;
  width: 90%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

.menu button {
  display: block;
  margin: 10px auto;
}

.player {
  display: flex;
  justify-content: space-between;
  background: #ddd;
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
}

.teams {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.team {
  background: #ccc;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>
let players = JSON.parse(localStorage.getItem("players") || "[]");
let savedTeams = JSON.parse(localStorage.getItem("teams") || "[]");
let darkMode = localStorage.getItem("dark") === "true";
let lang = localStorage.getItem("lang") || "ar";

if (darkMode) document.body.classList.add("dark");

function save() {
  localStorage.setItem("players", JSON.stringify(players));
  localStorage.setItem("teams", JSON.stringify(savedTeams));
}

function showMenu() {
  document.getElementById("app").innerHTML = `
    <h2>⚽ Team Splitter</h2>
    <div class="menu">
      <button onclick="newGame()">تقسيمة جديدة</button>
      <button onclick="showSaved()">تقسيماتك</button>
      <button onclick="settings()">الإعدادات</button>
    </div>
  `;
}

function newGame() {
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <input id="name" placeholder="اسم اللاعب">
    <select id="rating">
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>
    <button onclick="add()">إضافة</button>
    <div id="list"></div>
    <button onclick="split()">تقسيم</button>
  `;
  renderPlayers();
}

function add() {
  let name = document.getElementById("name").value;
  let rating = document.getElementById("rating").value;
  if (!name) return;
  players.push({name, rating});
  save();
  renderPlayers();
}

function renderPlayers() {
  let list = document.getElementById("list");
  if (!list) return;
  list.innerHTML = players.map((p,i)=>`
    <div class="player">
      ${p.name} (${p.rating})
      <button onclick="remove(${i})">❌</button>
    </div>
  `).join("");
}

function remove(i){
  players.splice(i,1);
  save();
  renderPlayers();
}

function split(){
  let a=[],b=[],sa=0,sb=0;
  let sorted=[...players].sort((x,y)=>y.rating-x.rating);
  sorted.forEach(p=>{
    if(sa<=sb){a.push(p);sa+=+p.rating}
    else{b.push(p);sb+=+p.rating}
  });

  savedTeams.push({a,b});
  save();

  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <h3>فريق A</h3>
    ${a.map(x=>x.name).join("<br>")}
    <h3>فريق B</h3>
    ${b.map(x=>x.name).join("<br>")}
  `;
}

function showSaved(){
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <h3>تقسيماتك</h3>
    ${savedTeams.map((t,i)=>`
      <div>
        فريق A: ${t.a.map(x=>x.name).join(", ")}<br>
        فريق B: ${t.b.map(x=>x.name).join(", ")}<br>
        <button onclick="delTeam(${i})">❌ حذف</button>
      </div><hr>
    `).join("")}
  `;
}

function delTeam(i){
  savedTeams.splice(i,1);
  save();
  showSaved();
}

function settings(){
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <h3>الإعدادات</h3>
    <button onclick="toggleDark()">تغيير الوضع</button>
    <button onclick="toggleLang()">تغيير اللغة</button>
  `;
}

function toggleDark(){
  darkMode=!darkMode;
  localStorage.setItem("dark", darkMode);
  location.reload();
}

function toggleLang(){
  lang = lang === "ar" ? "en" : "ar";
  localStorage.setItem("lang", lang);
  alert("ميزة اللغة تحتاج تطوير إضافي 😉");
}

showMenu();
</script>

</body>
</html>
