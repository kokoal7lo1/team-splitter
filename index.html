<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقسيم الفرق</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background: #f5f5f5;
  margin: 0;
}

.container {
  background: white;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}

h2 {
  font-size: 22px;
}

input, select, button {
  margin: 5px 0;
  padding: 12px;
  width: 100%;
  font-size: 16px;
  border-radius: 8px;
}

button {
  border: none;
  background: #007bff;
  color: white;
}

.delete {
  background: red;
  padding: 5px 10px;
  font-size: 14px;
}

.player {
  display: flex;
  justify-content: space-between;
  background: #eee;
  margin: 5px 0;
  padding: 10px;
  border-radius: 5px;
  align-items: center;
  font-size: 16px;
}

.teams {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 15px;
}

.team {
  background: #ddd;
  padding: 10px;
  border-radius: 10px;
}

@media (min-width: 600px) {
  .teams {
    flex-direction: row;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>تقسيم الفرق ⚽</h2>

  <input type="text" id="name" placeholder="اسم اللاعب">
  
  <select id="rating">
    <option value="1">⭐</option>
    <option value="2">⭐⭐</option>
    <option value="3">⭐⭐⭐</option>
    <option value="4">⭐⭐⭐⭐</option>
    <option value="5">⭐⭐⭐⭐⭐</option>
  </select>

  <button onclick="addPlayer()">➕ إضافة لاعب</button>

  <div id="players"></div>

  <button onclick="divideTeams()">⚽ تقسيم الفرق</button>
  <button onclick="shuffleTeams()">🔄 إعادة تقسيم</button>

  <div class="teams">
    <div class="team">
      <h3>فريق A</h3>
      <div id="teamA"></div>
      <p id="scoreA"></p>
    </div>

    <div class="team">
      <h3>فريق B</h3>
      <div id="teamB"></div>
      <p id="scoreB"></p>
    </div>
  </div>
</div>

<script>
let players = [];

function addPlayer() {
  let name = document.getElementById("name").value;
  let rating = parseInt(document.getElementById("rating").value);

  if (!name) return;

  players.push({ name, rating });
  document.getElementById("name").value = "";

  displayPlayers();
}

function deletePlayer(index) {
  players.splice(index, 1);
  displayPlayers();
}

function displayPlayers() {
  let list = document.getElementById("players");
  list.innerHTML = "";

  players.forEach((p, index) => {
    list.innerHTML += `
      <div class="player">
        ${p.name} - ${p.rating}⭐
        <button class="delete" onclick="deletePlayer(${index})">❌</button>
      </div>
    `;
  });
}

function divideTeams() {
  splitTeams(false);
}

function shuffleTeams() {
  splitTeams(true);
}

function splitTeams(randomize) {
  let teamA = [];
  let teamB = [];

  let sorted = [...players];

  if (randomize) {
    sorted.sort(() => Math.random() - 0.5);
  } else {
    sorted.sort((a, b) => b.rating - a.rating);
  }

  let scoreA = 0;
  let scoreB = 0;

  sorted.forEach(player => {
    if (scoreA <= scoreB) {
      teamA.push(player);
      scoreA += player.rating;
    } else {
      teamB.push(player);
      scoreB += player.rating;
    }
  });

  document.getElementById("teamA").innerHTML =
    teamA.map(p => p.name).join("<br>");
  document.getElementById("teamB").innerHTML =
    teamB.map(p => p.name).join("<br>");

  document.getElementById("scoreA").innerText = "المجموع: " + scoreA;
  document.getElementById("scoreB").innerText = "المجموع: " + scoreB;
}
</script>

</body>
</html>
