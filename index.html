<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كوكو للتقسيم</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  text-align: center;
  direction: rtl;
  background: #f5f5f5;
}

.dark {
  background: #111;
  color: white;
}

.container {
  padding: 20px;
}

button {
  padding: 12px;
  margin: 5px;
  width: 90%;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.player {
  display: flex;
  justify-content: space-between;
  background: #ddd;
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
}

.player div {
  display: flex;
  gap: 5px;
}

.small-btn {
  padding: 5px 8px;
  width: auto;
}

.delete {
  background: red;
  color: white;
}
</style>
</head>

<body>

<div id="app" class="container"></div>

<script>
let players = JSON.parse(localStorage.getItem("players") || "[]");
let savedTeams = JSON.parse(localStorage.getItem("teams") || "[]");
let darkMode = localStorage.getItem("dark") === "true";

if (darkMode) document.body.classList.add("dark");

function save() {
  localStorage.setItem("players", JSON.stringify(players));
  localStorage.setItem("teams", JSON.stringify(savedTeams));
}

function showMenu() {
  document.getElementById("app").innerHTML = `
    <h2>⚽ كوكو للتقسيم</h2>
    <button onclick="newGame()">تقسيمة يديدة</button>
    <button onclick="showSaved()">تقسيماتك</button>
    <button onclick="settings()">الإعدادات</button>
  `;
}

function newGame() {
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <input id="name" placeholder="اسم اللاعب">
    
    <select id="rating">
      <option value="1">⭐</option>
      <option value="2">⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="5">⭐⭐⭐⭐⭐</option>
    </select>

    <button onclick="add()">➕ إضافة</button>

    <div id="list"></div>

    <button onclick="split()">⚽ تقسيم</button>
  `;
  renderPlayers();
}

function add() {
  let name = document.getElementById("name").value;
  let rating = parseInt(document.getElementById("rating").value);

  if (!name) return;

  players.push({name, rating});
  document.getElementById("name").value = "";
  save();
  renderPlayers();
}

function remove(i){
  players.splice(i,1);
  save();
  renderPlayers();
}

function editPlayer(i){
  let newRating = prompt("حط تقييم جديد من 1 إلى 5:", players[i].rating);

  if(newRating >=1 && newRating <=5){
    players[i].rating = parseInt(newRating);
    save();
    renderPlayers();
  }
}

function renderPlayers() {
  let list = document.getElementById("list");
  if (!list) return;

  list.innerHTML = players.map((p,i)=>`
    <div class="player">
      ${p.name} (${"⭐".repeat(p.rating)})
      <div>
        <button class="small-btn" onclick="editPlayer(${i})">✏️</button>
        <button class="small-btn delete" onclick="remove(${i})">❌</button>
      </div>
    </div>
  `).join("");
}

let lastTeams = null;

function split(){
  let a=[],b=[],sa=0,sb=0;

  let shuffled = [...players].sort(() => Math.random() - 0.5);

  shuffled.forEach(p=>{
    if(sa<=sb){a.push(p);sa+=p.rating}
    else{b.push(p);sb+=p.rating}
  });

  lastTeams = {a,b};

  showResult();
}

function showResult(){
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>

    <h3>فريق A</h3>
    ${lastTeams.a.map(x=>x.name).join("<br>")}

    <h3>فريق B</h3>
    ${lastTeams.b.map(x=>x.name).join("<br>")}

    <br>
    <button onclick="saveTeams()">💾 حفظ</button>
    <button onclick="split()">🔄 إعادة تقسيم</button>
  `;
}

function showSaved(){
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <h3>📂 تقسيماتك</h3>

    ${savedTeams.length === 0 ? 
      "<p>ما عندك تقسيمات للحين 😅</p>" 
      : 
      savedTeams.map((t,i)=>`
        <div class="saved-card">

          <div class="saved-title">⚽ تقسيمة ${i+1}</div>

          <div class="saved-team">
            🔵 فريق A:<br>
            ${t.a.map(x=>x.name).join("، ")}
          </div>

          <div class="saved-team">
            🔴 فريق B:<br>
            ${t.b.map(x=>x.name).join("، ")}
          </div>

          <button class="delete-btn" onclick="delTeam(${i})">❌ حذف التقسيمة</button>

        </div>
      `).join("")
    }
  `;
}

function delTeam(i){
  savedTeams.splice(i,1);
  save();
  showSaved();
}

function settings(){
  document.getElementById("app").innerHTML = `
    <button onclick="showMenu()">⬅ رجوع</button>
    <h3>الإعدادات</h3>
    <button onclick="toggleDark()">🌙 / ☀️ تغيير الوضع</button>
  `;
}

function toggleDark(){
  darkMode = !darkMode;
  localStorage.setItem("dark", darkMode);

  if(darkMode){
    document.body.classList.add("dark");
  } else {
    document.body.classList.remove("dark");
  }
}

showMenu();
</script>

</body>
</html>
